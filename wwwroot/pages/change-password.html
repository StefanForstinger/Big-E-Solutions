<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Passwort ändern – Projektplaner</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="auth-page">

  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">🔒</div>
      <h1>Passwort ändern</h1>
      <p>Bitte ändern Sie Ihr Standardpasswort</p>
    </div>

    <div class="alert alert-info" style="margin-bottom: 1.5rem;">
      <strong>Hinweis:</strong> Sie verwenden ein Standardpasswort. Bitte wählen Sie ein neues, sicheres Passwort.
    </div>

    <form id="change-password-form" onsubmit="event.preventDefault(); changePassword();">
      <div class="form-group">
        <label for="current-password">Aktuelles Passwort</label>
        <input id="current-password" name="currentPassword" type="password" 
               placeholder="Ihr Standardpasswort" autocomplete="current-password" required>
      </div>
      <div class="form-group">
        <label for="new-password">Neues Passwort <span class="text-muted">(min. 6 Zeichen, 1 Zahl)</span></label>
        <input id="new-password" name="newPassword" type="password" 
               placeholder="Neues Passwort wählen" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="confirm-password">Passwort bestätigen</label>
        <input id="confirm-password" name="confirmPassword" type="password" 
               placeholder="Neues Passwort wiederholen" autocomplete="new-password" required>
      </div>
      <button id="btn-change" type="submit" class="btn btn-primary btn-full btn-lg">
        Passwort ändern
      </button>
    </form>
    <div id="msg-change" class="alert alert-hidden"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if not logged in
    if (!isLoggedIn()) {
      window.location.href = '/index.html';
    }

    async function changePassword() {
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!currentPassword || !newPassword || !confirmPassword) {
        showAlert('msg-change', 'Bitte alle Felder ausfüllen.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showAlert('msg-change', 'Die Passwörter stimmen nicht überein.', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showAlert('msg-change', 'Das Passwort muss mindestens 6 Zeichen lang sein.', 'error');
        return;
      }

      if (!/\d/.test(newPassword)) {
        showAlert('msg-change', 'Das Passwort muss mindestens eine Zahl enthalten.', 'error');
        return;
      }

      setLoading('btn-change', true);
      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          },
          body: JSON.stringify({
            currentPassword: currentPassword,
            newPassword: newPassword
          })
        });

        const data = await res.json();
        if (res.ok) {
          // Update token
          setToken(data.token);
          showAlert('msg-change', data.message || 'Passwort erfolgreich geändert!', 'success');
          // Redirect to dashboard after 1.5 seconds
          setTimeout(() => {
            window.location.href = '/pages/dashboard.html';
          }, 1500);
        } else {
          const errMsg = data.error ?? (Array.isArray(data.errors) 
            ? data.errors.map(e => e.description).join(' ') 
            : 'Passwortänderung fehlgeschlagen.');
          showAlert('msg-change', errMsg, 'error');
        }
      } catch (err) {
        showAlert('msg-change', 'Server nicht erreichbar.', 'error');
      } finally {
        setLoading('btn-change', false);
      }
    }
  </script>
</body>
</html>
